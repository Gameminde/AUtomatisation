<!DOCTYPE html>
{% set system_lang = (system_language | default('EN')) | upper %}
<html lang="{{ system_lang|lower }}" dir="{{ system_dir }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{{ t(react_title_key) }} | Content Factory</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23f5d000'/><text y='.9em' x='10' font-size='72' font-weight='800'>CF</text></svg>" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cf.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cf_react.css') }}">
</head>
<body class="cf-page cf-react-page" data-page="{{ react_page }}" data-system-lang="{{ system_lang }}" data-system-dir="{{ system_dir }}">
    <div id="cf-web-root"></div>

    <script>
        window.CF_LOCALE = {{ system_lang|tojson }};
        window.CF_I18N = {{ i18n_catalog|tojson }};
        window.__CF_WEB_BOOT__ = {{ {
            "page": react_page,
            "locale": system_lang,
            "dir": system_dir,
            "csrfToken": csrf_token(),
            "i18nCatalog": i18n_catalog,
            "user": {
                "email": current_user.email if current_user and current_user.is_authenticated else ""
            },
            "urls": {
                "dashboard": url_for("web.page_dashboard"),
                "studio": url_for("web.page_studio"),
                "channels": url_for("web.page_channels"),
                "settings": url_for("web.page_settings"),
                "diagnostics": url_for("web.page_diagnostics"),
                "login": url_for("auth.login"),
                "logout": url_for("auth.logout")
            }
        } | tojson }};
    </script>

    {% if react_dev_server %}
    <script type="module">
        import RefreshRuntime from "{{ react_dev_server }}/@react-refresh";
        RefreshRuntime.injectIntoGlobalHook(window);
        window.$RefreshReg$ = () => {};
        window.$RefreshSig$ = () => (type) => type;
        window.__vite_plugin_react_preamble_installed__ = true;
    </script>
    <script type="module" src="{{ react_dev_server }}/@vite/client"></script>
    <script type="module" src="{{ react_dev_server }}/src/main.tsx"></script>
    {% else %}
    <script type="module" src="{{ url_for('static', filename='web/assets/app.js') }}"></script>
    {% endif %}
</body>
</html>
